name: Price scan

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitor scan
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "content-type: application/json" \
            --data '{}' \
            "${{ secrets.MONITOR_SCAN_URL }}"
